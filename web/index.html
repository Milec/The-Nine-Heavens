<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0e1220" />
  <meta name="description" content="The Nine Heavens — a text-based Chinese cultivation (xianxia) RPG you can play in your browser or install on your phone." />
  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nine Heavens" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>The Nine Heavens · 九重天</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="tb-line1">
        <span id="tb-name">—</span>
        <span id="tb-realm" class="tb-realm">—</span>
      </div>
      <div class="tb-bars">
        <div class="bar qi"><div id="tb-qi-fill" class="fill"></div><span id="tb-qi-label" class="bar-label">Qi</span></div>
        <div class="bar hp"><div id="tb-hp-fill" class="fill"></div><span id="tb-hp-label" class="bar-label">HP</span></div>
      </div>
      <div id="tb-chips" class="tb-chips"></div>
    </header>

    <main id="log" aria-live="polite"></main>

    <nav id="actionbar">
      <button class="act" data-act="cultivate">Cultivate<small>1 yr</small></button>
      <button class="act" data-act="cultivate3">Seclude<small>3 yrs</small></button>
      <button class="act" data-act="wander">Wander<small>adventure</small></button>
      <button class="act act-break" data-act="breakthrough" id="btn-break">Break<small>through</small></button>
      <button class="act act-menu" data-act="menu">Menu<small>more</small></button>
    </nav>
  </div>

  <div id="overlay" class="hidden">
    <div id="overlay-card">
      <div id="overlay-head">
        <h2 id="overlay-title">—</h2>
        <button id="overlay-close" aria-label="Close">✕</button>
      </div>
      <div id="overlay-body"></div>
    </div>
  </div>

  <script type="module" src="ui.js"></script>
</body>
</html>
