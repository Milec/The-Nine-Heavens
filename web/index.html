<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d111c" />
  <meta name="description" content="The Nine Heavens — a xianxia life-sim RPG. Live a cultivator's life from birth to immortality, one year at a time." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nine Heavens" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>The Nine Heavens · 九重天</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Live ink-wash atmosphere: a single deliberate scene behind the whole app.
       Drawn in SVG so it is crisp at any density, weighs nothing, works offline,
       and retints itself with the soul's karma via CSS custom properties. -->
  <div id="sky" aria-hidden="true">
    <div class="sky-moon"></div>
    <div class="sky-cloud sc1"></div>
    <div class="sky-cloud sc2"></div>
    <div class="sky-cloud sc3"></div>
    <svg class="sky-peaks" viewBox="0 0 1440 1024" preserveAspectRatio="xMidYMax slice">
      <defs>
        <linearGradient id="mistFar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--peak-far)" stop-opacity="0"/>
          <stop offset=".55" stop-color="var(--peak-far)" stop-opacity=".5"/>
          <stop offset="1" stop-color="var(--peak-far)" stop-opacity=".85"/>
        </linearGradient>
        <linearGradient id="mistMid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--peak-mid)" stop-opacity="0"/>
          <stop offset=".5" stop-color="var(--peak-mid)" stop-opacity=".75"/>
          <stop offset="1" stop-color="var(--peak-mid)" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="mistNear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="var(--peak-near)" stop-opacity=".25"/>
          <stop offset=".4" stop-color="var(--peak-near)" stop-opacity=".9"/>
          <stop offset="1" stop-color="var(--peak-near)" stop-opacity="1"/>
        </linearGradient>
      </defs>
      <!-- far range -->
      <path fill="url(#mistFar)" d="M0 612 L150 548 L286 600 L430 506 L560 572 L700 470 L840 556 L980 484 L1130 566 L1280 512 L1440 580 L1440 1024 L0 1024 Z"/>
      <!-- mid range -->
      <path fill="url(#mistMid)" d="M0 720 L120 690 L250 742 L390 648 L520 712 L660 620 L800 700 L940 638 L1090 716 L1230 654 L1370 724 L1440 700 L1440 1024 L0 1024 Z"/>
      <!-- near range -->
      <path fill="url(#mistNear)" d="M0 866 L160 812 L300 868 L470 788 L640 860 L820 800 L1000 868 L1180 812 L1340 866 L1440 836 L1440 1024 L0 1024 Z"/>
    </svg>
    <div class="sky-mist"></div>
  </div>

  <div id="app">
    <header id="profile">
      <div class="pf-top">
        <div id="pf-avatar" class="pf-avatar"></div>
        <div class="pf-id">
          <div id="pf-name">—</div>
          <div id="pf-sub" class="pf-sub">—</div>
        </div>
        <button id="pf-more" class="pf-more" aria-label="Character sheet"></button>
      </div>
      <div id="pf-bars" class="pf-bars"></div>
      <div id="pf-attrs" class="pf-attrs"></div>
      <div id="pf-chips" class="pf-chips"></div>
    </header>

    <main id="log" aria-live="polite"></main>

    <nav id="tabbar">
      <button class="tab" data-tab="cultivate"><span class="ico" data-ico="cultivate"></span>Cultivate</button>
      <button class="tab" data-tab="people"><span class="ico" data-ico="people"></span>People</button>
      <button class="tab tab-age" data-tab="age"><span class="ico" data-ico="ageup"></span>Age&nbsp;Up</button>
      <button class="tab" data-tab="activities"><span class="ico" data-ico="pursuits"></span>Pursuits</button>
      <button class="tab" data-tab="sect"><span class="ico" data-ico="sect"></span>Sect</button>
    </nav>
  </div>

  <div id="overlay" class="hidden">
    <div id="overlay-card">
      <div id="overlay-head">
        <h2 id="overlay-title">—</h2>
        <button id="overlay-close" aria-label="Close"></button>
      </div>
      <div id="overlay-body"></div>
    </div>
  </div>

  <script type="module" src="ui.js"></script>
</body>
</html>
